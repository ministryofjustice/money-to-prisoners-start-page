# PARTLY generated by https://github.com/ministryofjustice/money-to-prisoners-deploy
version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5
  aws-ecr: circleci/aws-ecr@9

jobs:
  build-test-push:
    executor:
      name: aws-ecr/default
      docker_layer_caching: true
    environment:
      app: start-page
    working_directory: /tmp/repo
    steps:
      - checkout
      - run:
          name: Inspect tags
          command: |
            CIRCLE_BRANCH_LOWERCASE=$(echo $CIRCLE_BRANCH | tr '[:upper:]' '[:lower:]')

            registry=${ECR_REGISTRY}/${ECR_REPOSITORY}
            version=${CIRCLE_BRANCH_LOWERCASE}.${CIRCLE_SHA1:0:7}
            tag=${app}.${version}

            echo export CIRCLE_BRANCH_LOWERCASE=${CIRCLE_BRANCH_LOWERCASE} > /tmp/mtp-env.sh
            echo export registry=${registry} >> /tmp/mtp-env.sh
            echo export version=${version} >> /tmp/mtp-env.sh
            echo export tag=${tag} >> /tmp/mtp-env.sh

            echo "Building ${tag}"
      - aws-cli/setup:
          region: ${AWS_DEFAULT_REGION}
          role_arn: ${ECR_ROLE_TO_ASSUME}
      - run:
          name: Test code
          command: |
            . /tmp/mtp-env.sh
            mkdir -p /tmp/reports
            pip3 install -r requirements.txt -r requirements-tests.txt
            flake8
            pytest --capture no --junit-xml /tmp/reports/pytest.xml
      - restore_cache:
          name: Restoring docker cache
          keys:
            - docker-v1-{{ checksum "Dockerfile" }}
          paths:
            - /tmp/docker-cache.tar
      - run:
          name: Load docker cache
          command: |
            . /tmp/mtp-env.sh
            [[ -f /tmp/docker-cache.tar ]] && docker load -i /tmp/docker-cache.tar || true
      - run:
          name: Log docker into ECR
          command: |
            . /tmp/mtp-env.sh
            aws ecr get-login-password --region ${AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
      - run:
          name: Build docker image
          command: |
            . /tmp/mtp-env.sh
            docker build \
              --pull --force-rm \
              --cache-from=${app} \
              --build-arg APP_GIT_COMMIT=${CIRCLE_SHA1} \
              --build-arg APP_GIT_BRANCH=${CIRCLE_BRANCH} \
              --build-arg APP_BUILD_TAG=${tag} \
              --build-arg APP_BUILD_DATE=$(date +%FT%T%z) \
              --tag ${tag} --tag ${app} \
              .
      - run:
          name: Dumping docker cache
          command: |
            . /tmp/mtp-env.sh
            docker save -o /tmp/docker-cache.tar ${app}
      - save_cache:
          name: Saving docker cache
          key: docker-v1-{{ checksum "Dockerfile" }}
          paths:
            - /tmp/docker-cache.tar
      - store_artifacts:
          path: /tmp/reports
      - store_test_results:
          path: /tmp/reports
      - run:
          name: Push docker image
          command: |
            . /tmp/mtp-env.sh
            echo "Pushing ${tag} to ECR"
            docker tag ${tag} ${registry}:${tag}
            docker push ${registry}:${tag}
            if [[ "${CIRCLE_BRANCH}" == "main" ]]; then
              echo "Pushing ${app} to ECR (acts as latest)"
              docker tag ${tag} ${registry}:${app}
              docker push ${registry}:${app}
            fi
      - run:
          name: Log docker out of ECR
          command: |
            . /tmp/mtp-env.sh
            docker logout ${ECR_REGISTRY}
      - run:
          name: Clean up ECR
          command: |
            . /tmp/mtp-env.sh
            echo "Cleaning ECR"

            delete_images() {
              if [[ "${IMAGES_TO_DELETE}" ]]; then
                AWS_ECR_ARGS=
                for IMAGE_TO_DELETE in ${IMAGES_TO_DELETE}; do
                  AWS_ECR_ARGS="${AWS_ECR_ARGS} imageDigest=${IMAGE_TO_DELETE}"
                done
                aws ecr batch-delete-image --repository-name ${ECR_REPOSITORY} --image-ids ${AWS_ECR_ARGS}
              fi
            }

            echo "Deleting untagged images"
            IMAGES_TO_DELETE=$(aws ecr list-images --repository-name ${ECR_REPOSITORY} --filter tagStatus=UNTAGGED --query 'imageIds[*].imageDigest' --output text)
            delete_images

            if [[ "${CIRCLE_BRANCH}" != "main" ]]; then
              echo "Deleting other images from branch ${CIRCLE_BRANCH}"
              IMAGES_TO_DELETE=$(aws ecr describe-images --repository-name ${ECR_REPOSITORY} --query 'imageDetails[?@.imageTags && contains(map(&starts_with(@, '"'"${app}.${CIRCLE_BRANCH_LOWERCASE}."'"'), @.imageTags), `true`) && ! contains(@.imageTags, '"'"${tag}"'"')].imageDigest' --output text)
              delete_images
            fi

workflows:
  version: 2
  build-test-push:
    jobs:
      - build-test-push
